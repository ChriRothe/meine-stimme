    <filter id="s1"><feDropShadow dx="4" dy="8" stdDeviation="16" flood-color="#3b82f6" flood-opacity="0.3"/></filter>
    <filter id="s2"><feDropShadow dx="2" dy="4" stdDeviation="10" flood-color="#93c5fd" flood-opacity="0.4"/></filter>
