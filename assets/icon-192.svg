<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="bub1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bub2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="s1"><feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.3"/></filter>
    <filter id="s2"><feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#93c5fd" flood-opacity="0.4"/></filter>
  </defs>
  <!-- Hintergrund -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Große Sprechblase -->
  <rect x="20" y="50" width="110" height="82" rx="26" fill="url(#bub1)" filter="url(#s1)"/>
  <path d="M34 130 L20 158 L58 136" fill="url(#bub1)"/>
  <!-- Punkte große Blase -->
  <circle cx="54"  cy="91" r="9" fill="white" fill-opacity="0.95"/>
  <circle cx="75"  cy="91" r="9" fill="white" fill-opacity="0.95"/>
  <circle cx="96"  cy="91" r="9" fill="white" fill-opacity="0.95"/>
  <!-- Kleine Sprechblase -->
  <rect x="98" y="22" width="72" height="56" rx="18" fill="url(#bub2)" filter="url(#s2)"/>
  <path d="M110 76 L102 96 L130 80" fill="url(#bub2)"/>
  <!-- Punkte kleine Blase -->
  <circle cx="116" cy="50" r="6.5" fill="white" fill-opacity="0.9"/>
  <circle cx="134" cy="50" r="6.5" fill="white" fill-opacity="0.9"/>
  <circle cx="152" cy="50" r="6.5" fill="white" fill-opacity="0.9"/>
</svg>
